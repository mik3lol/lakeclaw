bundle:
  name: lakeclaw

variables:
  secret_scope:
    description: "Name of the Databricks secret scope containing app secrets"
    default: "lakeclaw"
  lakeclaw_volume:
    description: "UC volume path (e.g. /Volumes/catalog/schema/lakeclaw_volume)"
    default: "/Volumes/catalog/schema/lakeclaw_volume"

resources:
  apps:
    lakeclaw_app:
      name: lakeclaw-${bundle.target}
      description: "LakeClaw AI Gateway - Telegram bot with Databricks model serving"
      source_code_path: .

      resources:
        # Passphrase for authenticating with the LakeClaw gateway
        - name: gateway-passphrase
          secret:
            scope: ${var.secret_scope}
            key: gateway-passphrase
            permission: READ

        # Telegram Bot API token for receiving and sending messages
        - name: telegram-bot-token
          secret:
            scope: ${var.secret_scope}
            key: telegram-bot-token
            permission: READ

        # UC Volume for persisting state (soul, memories, sessions)
        - name: lakeclaw-volume
          uc_securable:
            securable_full_name: ${var.lakeclaw_volume}
            securable_type: VOLUME
            permission: WRITE_VOLUME

targets:
  dev:
    default: true
    mode: development

  prod:
    mode: production
    permissions:
      - user_name: ${DATABRICKS_CLIENT_ID}
        level: CAN_MANAGE
